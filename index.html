<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LABORATORY COMMAND CENTER - PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        :root {
            --bg: #f4f7f9; --card: #ffffff; --text: #2c3e50;
            --t0: #e9ecef; --t1: #ff5e57; --t2: #54a0ff; --t3: #1dd1a1;
            --t4: #ff9f43; --t5: #a29bfe; --t6: #feca57;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar, .info-panel { width: 320px; background: var(--card); padding: 20px; border: 1px solid #dce3e8; display: flex; flex-direction: column; }
        
        /* Таймер и Этапы */
        .timer-card { text-align: center; background: #34495e; color: white; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        #timer { font-size: 42px; font-weight: 700; }
        
        /* Сетка */
        .map-section { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        svg { width: 750px; height: 750px; }
        .sector { stroke: #fff; stroke-width: 2; rx: 10; transition: 0.3s; }
        .coord-label { font-size: 14px; fill: #95a5a6; font-weight: bold; }
        .id-label { font-size: 12px; fill: rgba(0,0,0,0.2); font-weight: bold; pointer-events: none; }
        .building { font-size: 24px; pointer-events: none; }
        
        .progress-bar { height: 6px; fill: rgba(0,0,0,0.1); rx: 3; }
        .progress-fill { height: 6px; fill: #27ae60; rx: 3; transition: 0.5s; }

        .init-row { display: flex; align-items: center; padding: 10px; margin-bottom: 8px; border-radius: 10px; border: 1px solid #eee; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="timer-card">
        <div id="phase" style="font-size: 12px; opacity: 0.8;">ЗАГРУЗКА...</div>
        <div id="timer">00:00</div>
    </div>
    <div id="legend"></div>
</div>

<div class="map-section">
    <svg id="map" viewBox="-50 -50 850 850"></svg>
</div>

<div class="info-panel">
    <div style="font-weight:700; margin-bottom:15px">ПОРЯДОК ХОДА</div>
    <div id="init-list"></div>
</div>

<script>
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbx226StctKQfvOuUmTIH9Je0RZnyk14RUeIjbMQ0b8kQK-_Dpds6KbJKP5JoiYZpwlz/exec'; // Ссылка /exec
    const colors = ['#e9ecef', '#ff5e57', '#54a0ff', '#1dd1a1', '#ff9f43', '#a29bfe', '#feca57'];
    const letters = ['A','B','C','D','E','F','G','H'];
    const buildings = { 'шахта': '⚒️', 'лаба': '🧪', 'завод': '🏭', 'сигналка': '🛡️' };

    // Генерируем легенду
    const leg = document.getElementById('legend');
    for(let i=1; i<=6; i++) {
        leg.innerHTML += `<div style="display:flex; align-items:center; gap:10px; margin-bottom:8px; font-size:14px;">
            <div style="width:12px; height:12px; border-radius:50%; background:${colors[i]}"></div> Команда ${i}
        </div>`;
    }

    // Рисуем карту Морской Бой
    const svg = document.getElementById('map');
    // Координаты букв и цифр
    for(let i=0; i<8; i++) {
        svg.innerHTML += `<text x="${i*100 + 40}" y="-15" class="coord-label">${letters[i]}</text>`;
        svg.innerHTML += `<text x="-35" y="${i*100 + 55}" class="coord-label">${i+1}</text>`;
    }

    for(let r=0; r<8; r++) {
        for(let c=0; c<8; c++) {
            const id = letters[c] + (r+1);
            const x = c * 100; const y = r * 100;
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.innerHTML = `
                <rect id="rect-${id}" class="sector" x="${x}" y="${y}" width="95" height="95" fill="${colors[0]}"></rect>
                <text x="${x+5}" y="${y+18}" class="id-label">${id}</text>
                <text id="build-${id}" class="building" x="${x+60}" y="${y+35}"></text>
                <rect class="progress-bar" x="${x+10}" y="${y+80}" width="75"></rect>
                <rect id="prog-${id}" class="progress-fill" x="${x+10}" y="${y+80}" width="0"></rect>
            `;
            svg.appendChild(g);
        }
    }

    async function update() {
        try {
            const res = await fetch(scriptUrl);
            const data = await res.json();
            let initHtml = "";

            data.forEach(item => {
                const id = item.id;
                const r = document.getElementById('rect-'+id);
                if(r) r.setAttribute('fill', colors[item.owner] || colors[0]);
                
                const p = document.getElementById('prog-'+id);
                if(p) p.setAttribute('width', (item.progress / 100) * 75);
                
                const b = document.getElementById('build-'+id);
                if(b) b.textContent = buildings[item.building.toLowerCase()] || "";

                if(item.init && colors[item.init]) {
                    initHtml += `<div class="init-row" style="border-left: 5px solid ${colors[item.init]}">Команда ${item.init}</div>`;
                }
            });
            document.getElementById('init-list').innerHTML = initHtml;
        } catch(e) { console.error("Ошибка обновления"); }
    }

    // Таймер
    const phases = [{n:"ИНИЦИАТИВА", t:60}, {n:"ОБСУЖДЕНИЕ", t:480}, {n:"АТАКА", t:240}];
    let cp = 0, tl = phases[0].t;
    setInterval(() => {
        if(tl > 0) tl--; else { cp = (cp+1)%3; tl = phases[cp].t; }
        document.getElementById('phase').innerText = phases[cp].n;
        let m = Math.floor(tl/60), s = tl%60;
        document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
    }, 1000);

    setInterval(update, 2000); // Обновление каждые 2 секунды!
    update();
</script>
</body>
</html>
