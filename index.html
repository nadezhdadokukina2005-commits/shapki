<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LABORATORY COMMAND CENTER - RESOURCE EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');
        :root {
            --bg: #f4f7f9; --card: #ffffff; --text: #2c3e50;
            --t0: #e2e8f0; --t1: #ff5e57; --t2: #54a0ff; --t3: #1dd1a1;
            --t4: #ff9f43; --t5: #a29bfe; --t6: #feca57;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar, .info-panel { width: 320px; background: var(--card); padding: 25px; border: 1px solid #dce3e8; display: flex; flex-direction: column; box-shadow: 0 0 15px rgba(0,0,0,0.03); }
        .map-section { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #eaeff2; }
        svg { width: 780px; height: 780px; filter: drop-shadow(0 8px 25px rgba(0,0,0,0.1)); }
        .sector { stroke: #fff; stroke-width: 2; rx: 14; transition: 0.4s; }
        .coord-label { font-size: 16px; fill: #94a3b8; font-weight: 800; }
        .id-label { font-size: 10px; fill: rgba(0,0,0,0.25); font-weight: 800; pointer-events: none; }
        .build-text { font-size: 13px; font-weight: 800; fill: #2d3436; }
        .progress-bar { height: 6px; fill: rgba(0,0,0,0.15); rx: 3; }
        .progress-fill { height: 6px; fill: #ffffff; rx: 3; transition: 0.6s ease; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2)); }
        .section-title { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; color: #64748b; text-transform: uppercase; margin-bottom: 20px; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; }
        .rank-card { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; margin-bottom: 10px; border-radius: 12px; background: #fff; border: 1px solid #edf2f7; transition: 0.5s; }
        .rank-info { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 14px; }
        .stat-val { text-align: right; }
        .stat-main { font-size: 16px; font-weight: 800; }
        .stat-sub { font-size: 9px; color: #94a3b8; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="section-title">Легенда Команд</div>
    <div id="legend"></div>
</div>

<div class="map-section">
    <svg id="map" viewBox="-60 -60 880 880"></svg>
</div>

<div class="info-panel">
    <div class="section-title">🏆 Рейтинг по Лечению</div>
    <div id="rank-list"></div>
</div>

<script>
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbwXJ8_nzMMAGofRRFwjnpy1efmwo6a4D7NTF2d9QflxNkkYrgvm1-oxh5ks1s0S1E-X/exec'; 

    const colors = ['#e2e8f0', '#ff5e57', '#54a0ff', '#1dd1a1', '#ff9f43', '#a29bfe', '#feca57'];
    const letters = ['A','B','C','D','E','F','G','H'];
    
    // Новые смайлы по твоему запросу
    const buildIcons = { wood: '🪵', iron: '🏭', gold: '⚒️', chem: '🧪' };

    // Отрисовка легенды
    const leg = document.getElementById('legend');
    for(let i=1; i<=6; i++) {
        leg.innerHTML += `<div style="display:flex; align-items:center; gap:10px; margin-bottom:12px; font-weight:700; font-size:14px;">
            <div style="width:12px; height:12px; border-radius:3px; background:${colors[i]}"></div> Команда №${i}
        </div>`;
    }

    // Карта
    const svg = document.getElementById('map');
    for(let i=0; i<8; i++) {
        svg.innerHTML += `<text x="${i*100 + 40}" y="-25" class="coord-label">${letters[i]}</text>`;
        svg.innerHTML += `<text x="-50" y="${i*100 + 55}" class="coord-label">${i+1}</text>`;
    }

    for(let r=0; r<8; r++) {
        for(let c=0; c<8; c++) {
            const id = letters[c] + (r+1);
            const x = c * 100; const y = r * 100;
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.innerHTML = `
                <rect id="rect-${id}" class="sector" x="${x}" y="${y}" width="94" height="94" fill="${colors[0]}"></rect>
                <text x="${x+6}" y="${y+18}" class="id-label">${id}</text>
                <g id="builds-${id}" class="building-group"></g>
                <rect class="progress-bar" x="${x+12}" y="${y+80}" width="70"></rect>
                <rect id="prog-${id}" class="progress-fill" x="${x+12}" y="${y+80}" width="0"></rect>
            `;
            svg.appendChild(g);
        }
    }

    async function update() {
        try {
            const res = await fetch(scriptUrl);
            const data = await res.json();
            
            let stats = {};
            for(let i=1; i<=6; i++) stats[i] = { captured: 0, healed: 0 };

            data.forEach(item => {
                const id = item.id;
                const rect = document.getElementById('rect-'+id);
                if(!rect) return;

                const owner = parseInt(item.owner);
                rect.setAttribute('fill', colors[owner] || colors[0]);
                
                if(owner >= 1 && owner <= 6) {
                    stats[owner].captured++;
                    if(parseInt(item.progress) >= 100) stats[owner].healed++;
                }

                // Белый контрастный ползунок
                const p = document.getElementById('prog-'+id);
                if(p) p.setAttribute('width', (Math.min(item.progress, 100) / 100) * 70);
                
                // Отрисовка построек из 4 колонок
                const bContainer = document.getElementById('builds-'+id);
                if(bContainer) {
                    bContainer.innerHTML = '';
                    let displayItems = [];
                    if(item.wood > 0) displayItems.push({icon: buildIcons.wood, count: item.wood});
                    if(item.iron > 0) displayItems.push({icon: buildIcons.iron, count: item.iron});
                    if(item.gold > 0) displayItems.push({icon: buildIcons.gold, count: item.gold});
                    if(item.chem > 0) displayItems.push({icon: buildIcons.chem, count: item.chem});

                    let offsetX = 10;
                    displayItems.forEach(obj => {
                        const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                        t.setAttribute('class', 'build-text');
                        t.setAttribute('x', parseInt(rect.getAttribute('x')) + offsetX);
                        t.setAttribute('y', parseInt(rect.getAttribute('y')) + 48);
                        t.textContent = `${obj.icon}${obj.count > 1 ? 'x'+obj.count : ''}`;
                        bContainer.appendChild(t);
                        offsetX += (obj.count > 1 ? 38 : 25);
                    });
                }
            });

            const sorted = Object.keys(stats).sort((a,b) => stats[b].healed - stats[a].healed || stats[b].captured - stats[a].captured);
            document.getElementById('rank-list').innerHTML = sorted.map((t, i) => `
                <div class="rank-card" style="border-left: 6px solid ${colors[t]}">
                    <div class="rank-info"><span>${i+1}</span> Команда №${t}</div>
                    <div class="stat-val"><div class="stat-main">${stats[t].healed}</div><div class="stat-sub">Вылечено</div></div>
                </div>
            `).join('');

        } catch(e) { console.log("Update Skip"); }
    }

    setInterval(update, 2000);
    update();
</script>
</body>
</html>
