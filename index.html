<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LABORATORY - WIDE VIEW</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root {
            --bg: #f0f2f5; --card: #ffffff; --text: #1a202c;
            --t0: #e2e8f0; --t1: #ff5e57; --t2: #54a0ff; --t3: #1dd1a1;
            --t4: #ff9f43; --t5: #a29bfe; --t6: #feca57;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Узкие боковые панели */
        .sidebar, .info-panel { width: 240px; background: var(--card); padding: 20px; border: 1px solid #dce3e8; display: flex; flex-direction: column; z-index: 10; }
        
        /* Широкая секция карты */
        .map-section { flex-grow: 1; display: flex; align-items: center; justify-content: flex-start; padding-left: 20px; background: #eaeff2; }
        
        /* Соотношение сторон теперь более вытянутое */
        svg { width: 95%; height: 90vh; max-width: 1100px; filter: drop-shadow(0 10px 30px rgba(0,0,0,0.08)); }
        
        .sector { stroke: #fff; stroke-width: 2; rx: 10; transition: 0.3s; }
        .coord-label { font-size: 18px; fill: #94a3b8; font-weight: 900; }
        .id-label { font-size: 11px; fill: rgba(0,0,0,0.3); font-weight: 900; pointer-events: none; }
        
        /* Текст построек */
        .build-text { font-size: 15px; font-weight: 700; fill: #2d3436; }
        .build-idx { font-size: 10px; font-weight: 900; fill: #2d3436; opacity: 0.8; }
        
        .progress-bar { height: 6px; fill: rgba(0,0,0,0.1); rx: 3; }
        .progress-fill { height: 6px; fill: #ffffff; rx: 3; transition: 0.6s ease; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.3)); }

        .section-title { font-size: 10px; font-weight: 900; letter-spacing: 1.5px; color: #64748b; text-transform: uppercase; margin-bottom: 15px; border-bottom: 2px solid #f1f5f9; padding-bottom: 5px; }
        
        .rank-card { display: flex; align-items: center; justify-content: space-between; padding: 10px; margin-bottom: 8px; border-radius: 10px; background: #fff; border: 1px solid #edf2f7; }
        .rank-info { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 13px; }
        .stat-main { font-size: 18px; font-weight: 900; color: #2d3748; }
        .stat-sub { font-size: 8px; color: #a0aec0; text-transform: uppercase; text-align: right; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="section-title">Команды</div>
    <div id="legend"></div>
</div>

<div class="map-section">
    <svg id="map" viewBox="-70 -60 1150 750"></svg>
</div>

<div class="info-panel">
    <div class="section-title">🏆 Рейтинг лечения</div>
    <div id="rank-list"></div>
</div>

<script>
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbwXJ8_nzMMAGofRRFwjnpy1efmwo6a4D7NTF2d9QflxNkkYrgvm1-oxh5ks1s0S1E-X/exec'; 

    const colors = ['#e2e8f0', '#ff5e57', '#54a0ff', '#1dd1a1', '#ff9f43', '#a29bfe', '#feca57'];
    const letters = ['A','B','C','D','E','F','G','H'];
    const buildIcons = { wood: '🪵', iron: '🏭', gold: '⚒️', chem: '🧪' };

    const leg = document.getElementById('legend');
    for(let i=1; i<=6; i++) {
        leg.innerHTML += `<div style="display:flex; align-items:center; gap:10px; margin-bottom:10px; font-weight:700; font-size:13px;">
            <div style="width:10px; height:10px; border-radius:2px; background:${colors[i]}"></div> Команда №${i}
        </div>`;
    }

    const svg = document.getElementById('map');
    // Сетка: ширина 135px, высота 85px (с отступами)
    for(let i=0; i<8; i++) {
        svg.innerHTML += `<text x="${i*135 + 60}" y="-25" class="coord-label">${letters[i]}</text>`;
        svg.innerHTML += `<text x="-55" y="${i*85 + 50}" class="coord-label">${i+1}</text>`;
    }

    for(let r=0; r<8; r++) {
        for(let c=0; c<8; c++) {
            const id = letters[c] + (r+1);
            const x = c * 135; const y = r * 85;
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.innerHTML = `
                <rect id="rect-${id}" class="sector" x="${x}" y="${y}" width="130" height="80" fill="${colors[0]}"></rect>
                <text x="${x+6}" y="${y+16}" class="id-label">${id}</text>
                <g id="builds-${id}"></g>
                <rect class="progress-bar" x="${x+15}" y="${y+68}" width="100"></rect>
                <rect id="prog-${id}" class="progress-fill" x="${x+15}" y="${y+68}" width="0"></rect>
            `;
            svg.appendChild(g);
        }
    }

    async function update() {
        try {
            const res = await fetch(scriptUrl);
            const data = await res.json();
            let stats = {}; for(let i=1; i<=6; i++) stats[i] = { captured: 0, healed: 0 };

            data.forEach(item => {
                const id = item.id;
                const rect = document.getElementById('rect-'+id);
                if(!rect) return;
                const owner = parseInt(item.owner);
                rect.setAttribute('fill', colors[owner] || colors[0]);
                
                if(owner >= 1 && owner <= 6) {
                    stats[owner].captured++;
                    if(parseInt(item.progress) >= 100) stats[owner].healed++;
                }

                const p = document.getElementById('prog-'+id);
                if(p) p.setAttribute('width', (Math.min(item.progress, 100) / 100) * 100);
                
                const bContainer = document.getElementById('builds-'+id);
                if(bContainer) {
                    bContainer.innerHTML = '';
                    let items = [];
                    if(item.wood > 0) items.push({icon: buildIcons.wood, count: item.wood});
                    if(item.iron > 0) items.push({icon: buildIcons.iron, count: item.iron});
                    if(item.gold > 0) items.push({icon: buildIcons.gold, count: item.gold});
                    if(item.chem > 0) items.push({icon: buildIcons.chem, count: item.chem});

                    // Рисуем постройки в 2 строки
                    items.forEach((obj, idx) => {
                        const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                        // Позиция: 1-я и 2-я иконки сверху, 3-я и 4-я снизу
                        const col = idx % 2;
                        const row = Math.floor(idx / 2);
                        const posX = parseInt(rect.getAttribute('x')) + 25 + (col * 55);
                        const posY = parseInt(rect.getAttribute('y')) + 35 + (row * 22);
                        
                        t.setAttribute('x', posX);
                        t.setAttribute('y', posY);
                        t.setAttribute('class', 'build-text');
                        t.innerHTML = `${obj.icon}<tspan class="build-idx" dy="-5">${obj.count > 1 ? 'x'+obj.count : ''}</tspan>`;
                        bContainer.appendChild(t);
                    });
                }
            });

            const sorted = Object.keys(stats).sort((a,b) => stats[b].healed - stats[a].healed || stats[b].captured - stats[a].captured);
            document.getElementById('rank-list').innerHTML = sorted.map((t, i) => `
                <div class="rank-card" style="border-left: 5px solid ${colors[t]}">
                    <div class="rank-info"><span>${i+1}</span>№${t}</div>
                    <div><div class="stat-main">${stats[t].healed}</div><div class="stat-sub">Вылечено</div></div>
                </div>
            `).join('');
        } catch(e) {}
    }
    setInterval(update, 2000); update();
</script>
</body>
</html>
